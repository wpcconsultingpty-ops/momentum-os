<script>
  (() => {
    const state = {
      selectedDate: 'Thursday, May 14',
      savedDays: {}
    };

    const qs = (selector, scope = document) => scope.querySelector(selector);
    const qsa = (selector, scope = document) => [...scope.querySelectorAll(selector)];

    const navButtons = qsa('[data-view-target]');
    const views = qsa('.view');
    const jumpButtons = qsa('[data-jump]');
    const sidebar = qs('#sidebar');
    const menuBtn = qs('#menuBtn');

    const moodRange = qs('#moodRange');
    const stressRange = qs('#stressRange');
    const energyRange = qs('#energyRange');

    const moodValue = qs('#moodValue');
    const stressValue = qs('#stressValue');
    const energyValue = qs('#energyValue');

    const signalInputs = qsa('.daily-signal');
    const habitInputs = qsa('.core-habit');

    const signalsValue = qs('#signalsValue');
    const habitsValue = qs('#habitsValue');

    const dailyScore = qs('#dailyScore');
    const scoreRing = qs('#scoreRing');
    const messageBadge = qs('#messageBadge');
    const statusEl = qs('#dayStatus');

    const avgScoreEl = qs('#avgScore');
    const weeklyAverageDisplay = qs('#weeklyAverageDisplay');
    const habitWinsEl = qs('#habitWins');
    const currentStreakEl = qs('#currentStreak');
    const savedDaysEl = qs('#savedDaysCount');

    const reflectionInput = qs('#reflectionInput');
    const tomorrowFocusInput = qs('#tomorrowFocusInput');

    const saveTodayBtn = qs('#saveTodayBtn');
    const loadTodayBtn = qs('#loadTodayBtn');
    const clearTodayBtn = qs('#clearTodayBtn');
    const topSaveBtn = qs('#topSaveBtn');
    const topDateLabel = qs('#topDateLabel');

    const selectedDateEl = qs('#selectedDate');
    const selectedScoreEl = qs('#selectedScore');
    const selectedMoodEl = qs('#selectedMood');
    const selectedStressEl = qs('#selectedStress');
    const selectedHabitsEl = qs('#selectedHabits');
    const selectedFocusEl = qs('#selectedFocus');
    const selectedNotesEl = qs('#selectedNotes');

    const calendar = qs('.calendar');
    const weekBars = qsa('.bar-wrap[data-score]');

    function showView(targetId) {
      views.forEach(view => {
        view.classList.toggle('active', view.id === targetId);
      });

      navButtons.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.viewTarget === targetId);
      });

      if (window.innerWidth <= 980 && sidebar) {
        sidebar.classList.remove('open');
      }
    }

    function jumpToTarget(targetId) {
      const target = document.getElementById(targetId);
      if (!target) return;

      const parentView = target.closest('.view');
      if (parentView) {
        showView(parentView.id);
        setTimeout(() => {
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 100);
      }
    }

    function formatScoreMessage(score) {
      if (score >= 80) return 'Strong day. Keep the night simple and protected.';
      if (score >= 65) return 'Good day. Stay deliberate.';
      if (score >= 50) return 'Mixed day. Simplify the next hour.';
      return 'Low day. Make the next step small and kind.';
    }

    function clampScore(score) {
      return Math.max(0, Math.min(100, Math.round(score)));
    }

    function getCheckedCount(inputs) {
      return inputs.filter(input => input.checked).length;
    }

    function calculateScore() {
      const mood = Number(moodRange?.value || 0);
      const stress = Number(stressRange?.value || 0);
      const energy = Number(energyRange?.value || 0);
      const signalsDone = getCheckedCount(signalInputs);
      const habitsDone = getCheckedCount(habitInputs);

      const weightedScore =
        mood * 3 +
        energy * 3 +
        (11 - stress) * 2.5 +
        signalsDone * 6 +
        habitsDone * 4.5;

      return {
        mood,
        stress,
        energy,
        signalsDone,
        habitsDone,
        score: clampScore(weightedScore)
      };
    }

    function updateScoreUI() {
      if (!moodRange || !stressRange || !energyRange) return null;

      const data = calculateScore();

      if (moodValue) moodValue.textContent = `${data.mood} / 10`;
      if (stressValue) stressValue.textContent = `${data.stress} / 10`;
      if (energyValue) energyValue.textContent = `${data.energy} / 10`;

      if (signalsValue) signalsValue.textContent = `${data.signalsDone} / ${signalInputs.length} logged`;
      if (habitsValue) habitsValue.textContent = `${data.habitsDone} / ${habitInputs.length} done`;

      if (dailyScore) dailyScore.textContent = data.score;
      if (messageBadge) messageBadge.textContent = formatScoreMessage(data.score);

      if (scoreRing) {
        const degrees = Math.round((data.score / 100) * 360);
        scoreRing.style.background = `conic-gradient(var(--accent) ${degrees}deg, rgba(255,255,255,.3) 0deg)`;
      }

      if (habitWinsEl) habitWinsEl.textContent = `${data.habitsDone}/${habitInputs.length}`;

      return data;
    }

    function getTodayPayload() {
      const data = calculateScore();

      return {
        date: state.selectedDate,
        score: data.score,
        mood: `${data.mood} / 10`,
        stress: `${data.stress} / 10`,
        habits: `${data.habitsDone} / ${habitInputs.length}`,
        focus: tomorrowFocusInput?.value.trim() || '-',
        notes: reflectionInput?.value.trim() || '-'
      };
    }

    function updateSelectedDayPanel(payload) {
      if (!payload) return;

      if (selectedDateEl) selectedDateEl.textContent = payload.date || '-';
      if (selectedScoreEl) selectedScoreEl.textContent = payload.score ?? '-';
      if (selectedMoodEl) selectedMoodEl.textContent = payload.mood || '-';
      if (selectedStressEl) selectedStressEl.textContent = payload.stress || '-';
      if (selectedHabitsEl) selectedHabitsEl.textContent = payload.habits || '-';
      if (selectedFocusEl) selectedFocusEl.textContent = payload.focus || '-';
      if (selectedNotesEl) selectedNotesEl.textContent = payload.notes || '-';

      if (topDateLabel) topDateLabel.textContent = payload.date || 'Today';
    }

    function setStatus(message) {
      if (statusEl) statusEl.textContent = message;
    }

    function parseBarScores() {
      const scores = weekBars
        .map(bar => Number(bar.dataset.score))
        .filter(score => !Number.isNaN(score));

      Object.values(state.savedDays).forEach(day => {
        if (typeof day.score === 'number') scores.push(day.score);
      });

      return scores;
    }

    function calculateAverage(scores) {
      if (!scores.length) return 0;
      return Math.round(scores.reduce((sum, value) => sum + value, 0) / scores.length);
    }

    function calculateStreak() {
      const savedCount = Object.keys(state.savedDays).length;
      return savedCount ? 6 + savedCount : 6;
    }

    function updateKpis() {
      const scores = parseBarScores();
      const avg = calculateAverage(scores);
      const savedCount = 29 + Object.keys(state.savedDays).length;
      const streak = calculateStreak();

      if (avgScoreEl) avgScoreEl.textContent = avg;
      if (weeklyAverageDisplay) weeklyAverageDisplay.textContent = avg;
      if (savedDaysEl) savedDaysEl.textContent = savedCount;
      if (currentStreakEl) currentStreakEl.textContent = streak;
    }

    function markSelectedCalendarDay(dayEl) {
      qsa('.day[data-date]').forEach(day => day.classList.remove('selected'));
      if (dayEl) dayEl.classList.add('selected');
    }

    function payloadFromDayElement(dayEl) {
      return {
        date: dayEl.dataset.date || '-',
        score: dayEl.dataset.score || '-',
        mood: dayEl.dataset.mood || '-',
        stress: dayEl.dataset.stress || '-',
        habits: dayEl.dataset.habits || '-',
        focus: dayEl.dataset.focus || '-',
        notes: dayEl.dataset.notes || '-'
      };
    }

    function updateDayAppearance(dayEl) {
      if (!dayEl) return;

      const score = Number(dayEl.dataset.score);
      const scoreEl = qs('.day-score', dayEl);
      const dot = qs('.day-dot', dayEl);

      if (scoreEl) {
        scoreEl.textContent = Number.isNaN(score) ? 'No entry' : `${score} score`;
      }

      if (dot) {
        dot.classList.remove('good', 'mid', 'bad');
        if (!Number.isNaN(score)) {
          if (score >= 70) dot.classList.add('good');
          else if (score >= 50) dot.classList.add('mid');
          else dot.classList.add('bad');
        }
      }
    }

    function bindCalendarDays() {
      qsa('.day[data-date]').forEach(day => {
        day.setAttribute('role', 'button');
        day.setAttribute('tabindex', '0');

        const activate = () => {
          markSelectedCalendarDay(day);
          const payload = payloadFromDayElement(day);
          updateSelectedDayPanel(payload);
          state.selectedDate = payload.date;
          setStatus(`Loaded ${state.selectedDate}.`);
        };

        day.addEventListener('click', activate);
        day.addEventListener('keydown', event => {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            activate();
          }
        });

        updateDayAppearance(day);
      });
    }

    function saveToday() {
      const payload = getTodayPayload();
      state.savedDays[payload.date] = payload;
      updateSelectedDayPanel(payload);
      updateKpis();
      setStatus(`Saved ${payload.date} with score ${payload.score}.`);

      const matchingDay = qsa('.day[data-date]').find(day => day.dataset.date === payload.date);
      if (matchingDay) {
        matchingDay.dataset.score = String(payload.score);
        matchingDay.dataset.mood = payload.mood;
        matchingDay.dataset.stress = payload.stress;
        matchingDay.dataset.habits = payload.habits;
        matchingDay.dataset.focus = payload.focus;
        matchingDay.dataset.notes = payload.notes;
        updateDayAppearance(matchingDay);
        markSelectedCalendarDay(matchingDay);
      }
    }

    function loadToday() {
      const saved = state.savedDays[state.selectedDate];
      if (!saved) {
        setStatus(`No saved entry found for ${state.selectedDate}.`);
        return;
      }

      if (selectedDateEl) selectedDateEl.textContent = saved.date;
      if (selectedScoreEl) selectedScoreEl.textContent = saved.score;
      if (selectedMoodEl) selectedMoodEl.textContent = saved.mood;
      if (selectedStressEl) selectedStressEl.textContent = saved.stress;
      if (selectedHabitsEl) selectedHabitsEl.textContent = saved.habits;
      if (selectedFocusEl) selectedFocusEl.textContent = saved.focus;
      if (selectedNotesEl) selectedNotesEl.textContent = saved.notes;

      if (tomorrowFocusInput) tomorrowFocusInput.value = saved.focus !== '-' ? saved.focus : '';
      if (reflectionInput) reflectionInput.value = saved.notes !== '-' ? saved.notes : '';

      setStatus(`Loaded saved entry for ${saved.date}.`);
    }

    function clearToday() {
      if (moodRange) moodRange.value = 1;
      if (stressRange) stressRange.value = 1;
      if (energyRange) energyRange.value = 1;

      signalInputs.forEach(input => {
        input.checked = false;
      });

      habitInputs.forEach(input => {
        input.checked = false;
      });

      if (reflectionInput) reflectionInput.value = '';
      if (tomorrowFocusInput) tomorrowFocusInput.value = '';

      markSelectedCalendarDay(null);
      updateScoreUI();
      updateKpis();

      updateSelectedDayPanel({
        date: 'No day selected',
        score: '-',
        mood: '-',
        stress: '-',
        habits: '-',
        focus: '-',
        notes: '-'
      });

      if (topDateLabel) {
        topDateLabel.textContent = 'No day selected';
      }

      setStatus('Cleared all dashboard inputs.');
    }

    function createDayElement(dayNumber, monthIndex, year) {
      const date = new Date(year, monthIndex, dayNumber);
      const label = date.toLocaleDateString('en-AU', {
        weekday: 'long',
        day: 'numeric',
        month: 'long'
      });

      const day = document.createElement('div');
      day.className = 'day';
      day.dataset.date = label;
      day.dataset.score = '-';
      day.dataset.mood = '-';
      day.dataset.stress = '-';
      day.dataset.habits = '-';
      day.dataset.focus = '-';
      day.dataset.notes = '-';

      day.innerHTML = `
        <div class="day-top">
          <div>${dayNumber}</div>
          <div class="day-dot"></div>
        </div>
        <div class="day-score">No entry</div>
      `;

      return day;
    }

    function ensureFullMonthCalendar() {
      if (!calendar) return;

      const weekdays = qsa('.weekday', calendar);
      if (weekdays.length !== 7) return;

      const existingDays = qsa('.day[data-date]', calendar);
      const existingNumbers = new Set(
        existingDays.map(day => {
          const dayNumberEl = qs('.day-top div:first-child', day);
          return Number(dayNumberEl?.textContent || 0);
        }).filter(Boolean)
      );

      const monthIndex = 4;
      const year = 2026;
      const totalDays = new Date(year, monthIndex + 1, 0).getDate();

      for (let dayNum = 1; dayNum <= totalDays; dayNum += 1) {
        if (!existingNumbers.has(dayNum)) {
          calendar.appendChild(createDayElement(dayNum, monthIndex, year));
        }
      }

      const totalChildren = calendar.children.length;
      const remainder = totalChildren % 7;
      if (remainder !== 0) {
        const needed = 7 - remainder;
        for (let i = 0; i < needed; i += 1) {
          const spacer = document.createElement('div');
          calendar.appendChild(spacer);
        }
      }
    }

    navButtons.forEach(button => {
      button.addEventListener('click', () => {
        showView(button.dataset.viewTarget);
      });
    });

    jumpButtons.forEach(button => {
      button.addEventListener('click', () => {
        jumpToTarget(button.dataset.jump);
      });
    });

    if (menuBtn) {
      menuBtn.addEventListener('click', () => {
        if (sidebar) sidebar.classList.toggle('open');
      });
    }

    document.addEventListener('click', event => {
      if (
        window.innerWidth <= 980 &&
        sidebar &&
        sidebar.classList.contains('open') &&
        !sidebar.contains(event.target) &&
        menuBtn &&
        !menuBtn.contains(event.target)
      ) {
        sidebar.classList.remove('open');
      }
    });

    [moodRange, stressRange, energyRange].forEach(input => {
      if (input) input.addEventListener('input', updateScoreUI);
    });

    [...signalInputs, ...habitInputs].forEach(input => {
      input.addEventListener('change', updateScoreUI);
    });

    if (saveTodayBtn) saveTodayBtn.addEventListener('click', saveToday);
    if (topSaveBtn) topSaveBtn.addEventListener('click', saveToday);
    if (loadTodayBtn) loadTodayBtn.addEventListener('click', loadToday);
    if (clearTodayBtn) clearTodayBtn.addEventListener('click', clearToday);

    ensureFullMonthCalendar();
    bindCalendarDays();
    updateScoreUI();
    updateKpis();

    const allCalendarDays = qsa('.day[data-date]');
    const initialSelectedDay = qs('.day.selected[data-date]') || allCalendarDays[allCalendarDays.length - 1];

    if (initialSelectedDay) {
      state.selectedDate = initialSelectedDay.dataset.date || state.selectedDate;
      updateSelectedDayPanel(payloadFromDayElement(initialSelectedDay));
    }

    setStatus('Ready.');
  })();
</script>
