<script>
  (() => {
    const today = new Date(2026, 4, 14); // May 14, 2026
    let visibleMonth = today.getMonth();
    let visibleYear = today.getFullYear();

    const state = {
      selectedDateKey: toDateKey(today),
      savedDays: {}
    };

    const sampleDays = [
      {
        date: new Date(2026, 4, 1),
        score: 58,
        mood: "5 / 10",
        stress: "6 / 10",
        habits: "3 / 6",
        focus: "Reset workflow",
        notes: "A stop-start day. Better once I reduced task switching."
      },
      {
        date: new Date(2026, 4, 2),
        score: 77,
        mood: "8 / 10",
        stress: "3 / 10",
        habits: "5 / 6",
        focus: "Close open actions",
        notes: "Strong energy and good structure."
      },
      {
        date: new Date(2026, 4, 3),
        score: 63,
        mood: "6 / 10",
        stress: "4 / 10",
        habits: "4 / 6",
        focus: "Family time first",
        notes: "Decent day with a softer pace."
      },
      {
        date: new Date(2026, 4, 4),
        score: 42,
        mood: "4 / 10",
        stress: "8 / 10",
        habits: "2 / 6",
        focus: "Recover early",
        notes: "Low-energy day. Needed less pressure, not more."
      },
      {
        date: new Date(2026, 4, 5),
        score: 57,
        mood: "5 / 10",
        stress: "5 / 10",
        habits: "3 / 6",
        focus: "Do first hard thing early",
        notes: "Recovered some momentum once priorities were clearer."
      },
      {
        date: new Date(2026, 4, 6),
        score: 75,
        mood: "7 / 10",
        stress: "4 / 10",
        habits: "5 / 6",
        focus: "Protect focus blocks",
        notes: "A good day with fewer interruptions."
      },
      {
        date: new Date(2026, 4, 7),
        score: 79,
        mood: "8 / 10",
        stress: "3 / 10",
        habits: "5 / 6",
        focus: "Keep morning simple",
        notes: "High-quality output and strong discipline."
      },
      {
        date: new Date(2026, 4, 8),
        score: 60,
        mood: "6 / 10",
        stress: "5 / 10",
        habits: "4 / 6",
        focus: "Finish one job fully",
        notes: "Solid enough, but scattered late."
      },
      {
        date: new Date(2026, 4, 9),
        score: 64,
        mood: "6 / 10",
        stress: "4 / 10",
        habits: "4 / 6",
        focus: "Avoid reactive work",
        notes: "Better than it felt in the moment."
      },
      {
        date: new Date(2026, 4, 14),
        score: 74,
        mood: "7 / 10",
        stress: "4 / 10",
        habits: "4 / 6",
        focus: "Finish proposal review",
        notes: "Good momentum overall. Afternoon drift started when I switched tasks too often. Best move tonight is a calmer shutdown and an early start."
      }
    ];

    sampleDays.forEach(day => {
      const key = toDateKey(day.date);
      state.savedDays[key] = {
        dateKey: key,
        date: formatFullDate(day.date),
        score: day.score,
        mood: day.mood,
        stress: day.stress,
        habits: day.habits,
        focus: day.focus,
        notes: day.notes
      };
    });

    const qs = (selector, scope = document) => scope.querySelector(selector);
    const qsa = (selector, scope = document) => [...scope.querySelectorAll(selector)];

    const navButtons = qsa("[data-view-target]");
    const views = qsa(".view");
    const jumpButtons = qsa("[data-jump]");
    const sidebar = qs("#sidebar");
    const menuBtn = qs("#menuBtn");

    const moodRange = qs("#moodRange");
    const stressRange = qs("#stressRange");
    const energyRange = qs("#energyRange");

    const moodValue = qs("#moodValue");
    const stressValue = qs("#stressValue");
    const energyValue = qs("#energyValue");

    const signalInputs = qsa(".daily-signal");
    const habitInputs = qsa(".core-habit");

    const signalsValue = qs("#signalsValue");
    const habitsValue = qs("#habitsValue");

    const dailyScore = qs("#dailyScore");
    const scoreRing = qs("#scoreRing");
    const messageBadge = qs("#messageBadge");
    const statusEl = qs("#dayStatus");

    const avgScoreEl = qs("#avgScore");
    const weeklyAverageDisplay = qs("#weeklyAverageDisplay");
    const habitWinsEl = qs("#habitWins");
    const currentStreakEl = qs("#currentStreak");
    const savedDaysEl = qs("#savedDaysCount");

    const reflectionInput = qs("#reflectionInput");
    const tomorrowFocusInput = qs("#tomorrowFocusInput");

    const saveTodayBtn = qs("#saveTodayBtn");
    const loadTodayBtn = qs("#loadTodayBtn");
    const clearTodayBtn = qs("#clearTodayBtn");
    const topSaveBtn = qs("#topSaveBtn");
    const topDateLabel = qs("#topDateLabel");

    const selectedDateEl = qs("#selectedDate");
    const selectedScoreEl = qs("#selectedScore");
    const selectedMoodEl = qs("#selectedMood");
    const selectedStressEl = qs("#selectedStress");
    const selectedHabitsEl = qs("#selectedHabits");
    const selectedFocusEl = qs("#selectedFocus");
    const selectedNotesEl = qs("#selectedNotes");

    const weekBars = qsa(".bar-wrap[data-score]");
    const calendar = qs(".calendar");

    const monthButtons = qsa("#historyView .action-row .btn");
    const previousMonthBtn = monthButtons[0];
    const currentMonthBtn = monthButtons[1];
    const nextMonthBtn = monthButtons[2];

    function toDateKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function formatFullDate(date) {
      return date.toLocaleDateString("en-US", {
        weekday: "long",
        month: "long",
        day: "numeric"
      });
    }

    function formatMonthTitle(year, month) {
      return new Date(year, month, 1).toLocaleDateString("en-US", {
        month: "long",
        year: "numeric"
      });
    }

    function showView(targetId) {
      views.forEach(view => {
        view.classList.toggle("active", view.id === targetId);
      });

      navButtons.forEach(btn => {
        btn.classList.toggle("active", btn.dataset.viewTarget === targetId);
      });

      if (window.innerWidth <= 980 && sidebar) {
        sidebar.classList.remove("open");
      }
    }

    function jumpToTarget(targetId) {
      const target = document.getElementById(targetId);
      if (!target) return;

      const parentView = target.closest(".view");

      if (parentView) {
        showView(parentView.id);

        setTimeout(() => {
          target.scrollIntoView({
            behavior: "smooth",
            block: "start"
          });
        }, 100);
      }
    }

    function formatScoreMessage(score) {
      if (score >= 80) return "Strong day. Keep the night simple and protected.";
      if (score >= 65) return "Good day. Stay deliberate.";
      if (score >= 50) return "Mixed day. Simplify the next hour.";
      return "Low day. Make the next step small and kind.";
    }

    function clampScore(score) {
      return Math.max(0, Math.min(100, Math.round(score)));
    }

    function getCheckedCount(inputs) {
      return inputs.filter(input => input.checked).length;
    }

    function calculateScore() {
      const mood = Number(moodRange?.value || 0);
      const stress = Number(stressRange?.value || 0);
      const energy = Number(energyRange?.value || 0);
      const signalsDone = getCheckedCount(signalInputs);
      const habitsDone = getCheckedCount(habitInputs);

      const weightedScore =
        mood * 3 +
        energy * 3 +
        (11 - stress) * 2.5 +
        signalsDone * 6 +
        habitsDone * 4.5;

      return {
        mood,
        stress,
        energy,
        signalsDone,
        habitsDone,
        score: clampScore(weightedScore)
      };
    }

    function updateScoreUI() {
      if (!moodRange || !stressRange || !energyRange) return;

      const data = calculateScore();

      moodValue.textContent = `${data.mood} / 10`;
      stressValue.textContent = `${data.stress} / 10`;
      energyValue.textContent = `${data.energy} / 10`;

      signalsValue.textContent = `${data.signalsDone} / ${signalInputs.length} logged`;
      habitsValue.textContent = `${data.habitsDone} / ${habitInputs.length} done`;

      dailyScore.textContent = data.score;
      messageBadge.textContent = formatScoreMessage(data.score);

      const degrees = Math.round((data.score / 100) * 360);
      scoreRing.style.background = `conic-gradient(var(--accent) ${degrees}deg, rgba(255,255,255,.3) 0deg)`;

      habitWinsEl.textContent = `${data.habitsDone}/${habitInputs.length}`;

      return data;
    }

    function getTodayPayload() {
      const data = calculateScore();
      const date = new Date(today);
      const key = toDateKey(date);

      return {
        dateKey: key,
        date: formatFullDate(date),
        score: data.score,
        mood: `${data.mood} / 10`,
        stress: `${data.stress} / 10`,
        habits: `${data.habitsDone} / ${habitInputs.length}`,
        focus: tomorrowFocusInput.value.trim() || "-",
        notes: reflectionInput.value.trim() || "-"
      };
    }

    function updateSelectedDayPanel(payload) {
      if (!payload) return;

      selectedDateEl.textContent = payload.date || "-";
      selectedScoreEl.textContent = payload.score ?? "-";
      selectedMoodEl.textContent = payload.mood || "-";
      selectedStressEl.textContent = payload.stress || "-";
      selectedHabitsEl.textContent = payload.habits || "-";
      selectedFocusEl.textContent = payload.focus || "-";
      selectedNotesEl.textContent = payload.notes || "-";

      if (topDateLabel) {
        topDateLabel.textContent = payload.date || "Today";
      }
    }

    function parseBarScores() {
      const scores = weekBars
        .map(bar => Number(bar.dataset.score))
        .filter(score => !Number.isNaN(score));

      Object.values(state.savedDays).forEach(day => {
        if (typeof day.score === "number") {
          scores.push(day.score);
        }
      });

      return scores;
    }

    function calculateAverage(scores) {
      if (!scores.length) return 0;

      return Math.round(
        scores.reduce((sum, value) => sum + value, 0) / scores.length
      );
    }

    function calculateStreak() {
      const keys = Object.keys(state.savedDays).sort();
      if (!keys.length) return 0;

      let streak = 0;
      let cursor = new Date(today);

      while (true) {
        const key = toDateKey(cursor);

        if (state.savedDays[key]) {
          streak += 1;
          cursor.setDate(cursor.getDate() - 1);
        } else {
          break;
        }
      }

      return streak;
    }

    function updateKpis() {
      const scores = parseBarScores();
      const avg = calculateAverage(scores);
      const savedCount = Object.keys(state.savedDays).length;
      const streak = calculateStreak();

      avgScoreEl.textContent = avg;
      weeklyAverageDisplay.textContent = avg;
      savedDaysEl.textContent = savedCount;
      currentStreakEl.textContent = streak;
    }

    function setStatus(message) {
      if (statusEl) {
        statusEl.textContent = message;
      }
    }

    function dotClassForScore(score) {
      if (score >= 70) return "good";
      if (score >= 50) return "mid";
      return "bad";
    }

    function renderCalendar() {
      if (!calendar) return;

      calendar.innerHTML = "";

      const weekdays = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];

      weekdays.forEach(day => {
        const el = document.createElement("div");
        el.className = "weekday";
        el.textContent = day;
        calendar.appendChild(el);
      });

      const firstDay = new Date(visibleYear, visibleMonth, 1);
      const daysInMonth = new Date(visibleYear, visibleMonth + 1, 0).getDate();
      const startOffset = firstDay.getDay();

      for (let i = 0; i < startOffset; i += 1) {
        const spacer = document.createElement("div");
        spacer.className = "day-empty";
        calendar.appendChild(spacer);
      }

      for (let dayNumber = 1; dayNumber <= daysInMonth; dayNumber += 1) {
        const date = new Date(visibleYear, visibleMonth, dayNumber);
        const key = toDateKey(date);
        const saved = state.savedDays[key];

        const dayEl = document.createElement("div");
        dayEl.className = "day";
        dayEl.dataset.dateKey = key;
        dayEl.setAttribute("role", "button");
        dayEl.setAttribute("tabindex", "0");

        if (key === toDateKey(today)) {
          dayEl.classList.add("today");
        }

        if (key === state.selectedDateKey) {
          dayEl.classList.add("selected");
        }

        const top = document.createElement("div");
        top.className = "day-top";

        const number = document.createElement("div");
        number.textContent = dayNumber;

        const dot = document.createElement("div");
        dot.className = "day-dot";

        if (saved && typeof saved.score === "number") {
          dot.classList.add(dotClassForScore(saved.score));
        }

        top.appendChild(number);
        top.appendChild(dot);

        const score = document.createElement("div");
        score.className = "day-score";
        score.textContent = saved ? `${saved.score} score` : "No entry";

        dayEl.appendChild(top);
        dayEl.appendChild(score);

        const activate = () => {
          state.selectedDateKey = key;
          renderCalendar();

          if (saved) {
            updateSelectedDayPanel(saved);
            setStatus(`Loaded ${saved.date}.`);
          } else {
            const emptyPayload = {
              dateKey: key,
              date: formatFullDate(date),
              score: "-",
              mood: "-",
              stress: "-",
              habits: "-",
              focus: "-",
              notes: "No saved notes for this day."
            };

            updateSelectedDayPanel(emptyPayload);
            setStatus(`No saved entry for ${emptyPayload.date}.`);
          }
        };

        dayEl.addEventListener("click", activate);

        dayEl.addEventListener("keydown", event => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            activate();
          }
        });

        calendar.appendChild(dayEl);
      }

      const heading = qs("#historyView h3");
      if (heading) {
        heading.textContent = `Calendar history — ${formatMonthTitle(visibleYear, visibleMonth)}`;
      }
    }

    function saveToday() {
      const payload = getTodayPayload();

      state.savedDays[payload.dateKey] = payload;
      state.selectedDateKey = payload.dateKey;

      updateSelectedDayPanel(payload);
      updateKpis();

      visibleMonth = today.getMonth();
      visibleYear = today.getFullYear();

      renderCalendar();

      setStatus(`Saved ${payload.date} with score ${payload.score}.`);
    }

    function loadToday() {
      const saved = state.savedDays[toDateKey(today)];

      if (!saved) {
        setStatus(`No saved entry found for ${formatFullDate(today)}.`);
        return;
      }

      state.selectedDateKey = saved.dateKey;

      updateSelectedDayPanel(saved);

      tomorrowFocusInput.value = saved.focus !== "-" ? saved.focus : "";
      reflectionInput.value = saved.notes !== "-" ? saved.notes : "";

      visibleMonth = today.getMonth();
      visibleYear = today.getFullYear();

      renderCalendar();

      setStatus(`Loaded saved entry for ${saved.date}.`);
    }

    function clearToday() {
      moodRange.value = 1;
      stressRange.value = 1;
      energyRange.value = 1;

      signalInputs.forEach(input => {
        input.checked = false;
      });

      habitInputs.forEach(input => {
        input.checked = false;
      });

      reflectionInput.value = "";
      tomorrowFocusInput.value = "";

      updateScoreUI();
      updateKpis();

      updateSelectedDayPanel({
        date: "No day selected",
        score: "-",
        mood: "-",
        stress: "-",
        habits: "-",
        focus: "-",
        notes: "-"
      });

      state.selectedDateKey = "";

      if (topDateLabel) {
        topDateLabel.textContent = "No day selected";
      }

      renderCalendar();

      setStatus("Cleared all dashboard inputs.");
    }

    navButtons.forEach(button => {
      button.addEventListener("click", () => {
        showView(button.dataset.viewTarget);
      });
    });

    jumpButtons.forEach(button => {
      button.addEventListener("click", () => {
        jumpToTarget(button.dataset.jump);
      });
    });

    if (menuBtn) {
      menuBtn.addEventListener("click", () => {
        sidebar.classList.toggle("open");
      });
    }

    document.addEventListener("click", event => {
      if (
        window.innerWidth <= 980 &&
        sidebar &&
        sidebar.classList.contains("open") &&
        !sidebar.contains(event.target) &&
        menuBtn &&
        !menuBtn.contains(event.target)
      ) {
        sidebar.classList.remove("open");
      }
    });

    [moodRange, stressRange, energyRange].forEach(input => {
      if (input) {
        input.addEventListener("input", updateScoreUI);
      }
    });

    [...signalInputs, ...habitInputs].forEach(input => {
      input.addEventListener("change", updateScoreUI);
    });

    if (saveTodayBtn) saveTodayBtn.addEventListener("click", saveToday);
    if (topSaveBtn) topSaveBtn.addEventListener("click", saveToday);
    if (loadTodayBtn) loadTodayBtn.addEventListener("click", loadToday);
    if (clearTodayBtn) clearTodayBtn.addEventListener("click", clearToday);

    if (previousMonthBtn) {
      previousMonthBtn.addEventListener("click", () => {
        visibleMonth -= 1;

        if (visibleMonth < 0) {
          visibleMonth = 11;
          visibleYear -= 1;
        }

        renderCalendar();
      });
    }

    if (currentMonthBtn) {
      currentMonthBtn.addEventListener("click", () => {
        visibleMonth = today.getMonth();
        visibleYear = today.getFullYear();
        state.selectedDateKey = toDateKey(today);

        const saved = state.savedDays[state.selectedDateKey];

        if (saved) {
          updateSelectedDayPanel(saved);
        }

        renderCalendar();
      });
    }

    if (nextMonthBtn) {
      nextMonthBtn.addEventListener("click", () => {
        visibleMonth += 1;

        if (visibleMonth > 11) {
          visibleMonth = 0;
          visibleYear += 1;
        }

        renderCalendar();
      });
    }

    updateScoreUI();
    updateKpis();
    renderCalendar();

    const initialPayload = state.savedDays[state.selectedDateKey];

    if (initialPayload) {
      updateSelectedDayPanel(initialPayload);
    }

    setStatus("Ready.");
  })();
</script>
